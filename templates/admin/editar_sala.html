{% extends "base.html" %}

{% block title %}Editar Sala - Agencei{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Editar Sala</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('admin.editar_sala', sala_id=sala.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome da Sala *</label>
                            <input type="text" name="nome" id="nome" class="form-control" value="{{ sala.nome }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="capacidade" class="form-label">Capacidade *</label>
                            <input type="number" name="capacidade" id="capacidade" class="form-control" value="{{ sala.capacidade }}" min="1" required>
                        </div>

                        <div class="mb-3">
                            <label for="descricao" class="form-label">Descrição (Opcional)</label>
                            <textarea name="descricao" id="descricao" class="form-control" rows="3">{{ sala.descricao or '' }}</textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-between mt-4">
                            <a href="{{ url_for('admin.salas') }}" class="btn btn-secondary">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                Salvar Alterações
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
